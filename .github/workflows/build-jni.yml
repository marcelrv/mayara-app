name: Build JNI Library (libradar.so)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'mayara-jni/**'
      - 'mayara-server/**'
      - 'scripts/build_jni.sh'
      - '.github/workflows/build-jni.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-android-jni:
    name: Build ARM64 JNI Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Initialize mayara-server submodule

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache cargo and cargo-ndk
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-ndk
            ~/.cargo/registry
            ~/.cargo/git
            mayara-jni/target
            mayara-server/target
          key: ${{ runner.os }}-cargo-jni-${{ hashFiles('mayara-jni/Cargo.lock', 'mayara-server/Cargo.lock') }}

      - name: Install cargo-ndk
        run: |
          if ! command -v cargo-ndk &> /dev/null; then
            echo "Installing cargo-ndk..."
            cargo install cargo-ndk --locked
          else
            cargo-ndk --version
          fi

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b

      - name: Verify build environment
        run: |
          echo "=== Rust toolchain ==="
          rustc --version
          cargo --version
          rustup target list | grep aarch64-linux-android
          
          echo ""
          echo "=== Build tools ==="
          cargo-ndk --version
          
          echo ""
          echo "=== Android NDK ==="
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          test -d "$ANDROID_NDK_HOME" || (echo "ERROR: NDK not found" && exit 1)
          
          echo ""
          echo "=== Git submodule ==="
          git submodule status
          test -d "mayara-server/src" || (echo "ERROR: mayara-server not initialized" && exit 1)

      - name: Build JNI library (ARM64)
        run: |
          bash scripts/build_jni.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUST_BACKTRACE: full

      - name: Verify artifact
        run: |
          if [ -f app/src/main/jniLibs/arm64-v8a/libradar.so ]; then
            echo "✅ libradar.so built successfully!"
            ls -lh app/src/main/jniLibs/arm64-v8a/libradar.so
            file app/src/main/jniLibs/arm64-v8a/libradar.so
          else
            echo "❌ libradar.so not found!"
            exit 1
          fi

      - name: Upload JNI library artifact
        uses: actions/upload-artifact@v4
        with:
          name: libradar-so
          path: app/src/main/jniLibs/arm64-v8a/libradar.so
          retention-days: 90
          if-no-files-found: error

      - name: Commit and push libradar.so (main branch only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/src/main/jniLibs/arm64-v8a/libradar.so
          git diff --cached --exit-code || git commit -m "build: libradar.so from GitHub Actions"
          git push || echo "Nothing to push"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
