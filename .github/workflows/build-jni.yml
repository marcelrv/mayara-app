name: Build JNI Library (libradar.so)

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'mayara-jni/**'
      - 'mayara-server/**'
      - 'scripts/build_jni.sh'
      - '.github/workflows/build-jni.yml'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:  # Allow manual trigger

jobs:
  build-android-jni:
    name: Build ARM64 JNI Library
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Initialize mayara-server submodule

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        run: |
          echo "Setting up Android NDK..."
          mkdir -p ~/android-ndk
          cd ~/android-ndk
          
          # Download NDK from official Google source
          NDK_VERSION="r26.1.10909125"
          NDK_URL="https://dl.google.com/android/repository/android-ndk-${NDK_VERSION}-linux-x86_64.zip"
          NDK_ZIP="android-ndk-${NDK_VERSION}-linux-x86_64.zip"
          
          if [ ! -f "$NDK_ZIP" ]; then
            echo "Downloading NDK..."
            wget -q "$NDK_URL" -O "$NDK_ZIP" || curl -L -o "$NDK_ZIP" "$NDK_URL"
          fi
          
          echo "Extracting NDK..."
          unzip -q "$NDK_ZIP"
          
          NDK_PATH="$(pwd)/android-ndk-${NDK_VERSION}"
          echo "ANDROID_NDK_HOME=${NDK_PATH}" >> $GITHUB_ENV
          echo "NDK installed at ${NDK_PATH}"
          ls -la "${NDK_PATH}/" || echo "Failed to extract NDK"

      - name: Verify Rust and cargo-ndk
        run: |
          echo "==> Rust version:"
          rustc --version && cargo --version
          echo "==> cargo-ndk location:"
          which cargo-ndk || echo "WARNING: cargo-ndk not in PATH"
          echo "==> Android NDK:"
          echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME"
          if [ -d "$ANDROID_NDK_HOME" ]; then
            echo "✓ NDK directory exists"
            ls -la "$ANDROID_NDK_HOME/" | head -10
          else
            echo "✗ NDK directory NOT FOUND"
            exit 1
          fi
          echo "==> Rust targets:"
          rustup target list | grep aarch64-linux-android

      - name: Verify submodule
        run: |
          echo "==> Submodule status:"
          git submodule status
          echo "==> mayara-server contents:"
          ls -la mayara-server/ | head -10

      - name: Build JNI library (ARM64)
        run: |
          set -x  # Enable debug output
          bash scripts/build_jni.sh
        env:
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          RUST_BACKTRACE: 1
          CARGO_VERBOSE: true

      - name: Verify artifact
        run: |
          if [ -f app/src/main/jniLibs/arm64-v8a/libradar.so ]; then
            echo "✅ libradar.so built successfully!"
            ls -lh app/src/main/jniLibs/arm64-v8a/libradar.so
            file app/src/main/jniLibs/arm64-v8a/libradar.so
          else
            echo "❌ libradar.so not found!"
            exit 1
          fi

      - name: Upload JNI library artifact
        uses: actions/upload-artifact@v4
        with:
          name: libradar-so
          path: app/src/main/jniLibs/arm64-v8a/libradar.so
          retention-days: 90

      - name: Commit and push libradar.so
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add app/src/main/jniLibs/arm64-v8a/libradar.so
          git commit -m "build: libradar.so from GitHub Actions" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
